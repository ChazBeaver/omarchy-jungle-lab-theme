background-color=#131515
text-color=#d6e2dc
border-color=#1c1f1f
progress-color=over #1F2A24
width=420
height=110
padding=12
border-size=2
border-radius=12
font=Liberation Sans 11
anchor=top-right
outer-margin=20
default-timeout=5000
max-icon-size=32
icons=1
markup=1
format=<b>%s</b>\n%b

[urgency=low]
background-color=#131515
text-color=#5c6f66
border-color=#1c1f1f
default-timeout=3000

[urgency=normal]
background-color=#131515
text-color=#d6e2dc
border-color=#1c1f1f
default-timeout=5000

[urgency=high]
background-color=#131515
text-color=#f0fffa
border-color=#a35a3a
default-timeout=0

[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=true

[mode=do-not-disturb app-name=notify-send]
invisible=false
